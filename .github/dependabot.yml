---
version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      time: "06:00"
      timezone: Europe/London
      interval: daily
    cooldown:
      default-days: 7
      semver-minor-days: 9
      semver-major-days: 11
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      time: "06:00"
      timezone: Europe/London
      interval: daily
    cooldown:
      default-days: 7
    labels:
      - dependencies
